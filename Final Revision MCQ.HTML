<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reading & Listening Comprehension</title>
    <style>
        /* CSS VARIABLES & RESET */
        :root {
            --bg-color: #e0f2fe; /* Light blue background */
            --card-bg: #ffffff;
            --text-color: #000000;
            --primary-dark: #1e3a8a;
            --correct-color: #16a34a; 
            --wrong-color: #dc2626; 
            --border-color: #cbd5e1;
            --base-font-size: 20px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-size: var(--base-font-size);
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            overflow-x: hidden;
            transition: font-size 0.3s ease;
        }

        /* TYPOGRAPHY */
        h1, h2, h3 {
            font-weight: 300; 
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            margin: 15px 0;
        }

        /* HEADER & NAVIGATION */
        #top-bar {
            position: fixed;
            top: 0; left: 0; width: 100%;
            background-color: var(--primary-dark);
            color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 1000;
            transition: transform 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            flex-wrap: wrap;
            gap: 10px;
        }

        #top-bar.distraction-free {
            transform: translateY(-100%);
        }

        .tabs {
            display: flex;
            gap: 5px;
            flex-wrap: wrap;
            flex-grow: 1;
        }

        .tab-btn, .control-btn {
            background-color: transparent;
            color: white;
            border: 1px solid white;
            padding: 8px 15px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            text-transform: uppercase;
            font-weight: bold;
            border-radius: 4px;
        }

        .tab-btn.active, .tab-btn:hover, .control-btn:hover {
            background-color: white;
            color: var(--primary-dark);
            transform: scale(1.05); 
        }

        .controls-group {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        /* ANIMATED GRADIENT BUTTONS */
        @keyframes gradientShift { 
            0% {background-position: 0% 50%;} 
            50% {background-position: 100% 50%;} 
            100% {background-position: 0% 50%;} 
        }

        #auto-save-btn, .btn-cancel {
            background: linear-gradient(45deg, #ef4444, #b91c1c, #ef4444);
            background-size: 200% 200%;
            border: none;
            color: white;
            animation: gradientShift 3s ease infinite;
        }
        
        #auto-save-btn.active, .btn-submit, .generate-btn {
            background: linear-gradient(45deg, #0ea5e9, #16a34a, #0ea5e9);
            background-size: 200% 200%;
            border: none;
            color: white;
            animation: gradientShift 3s ease infinite;
        }

        #auto-save-btn:hover, .btn-submit:hover:not(:disabled), .btn-cancel:hover, .generate-btn:hover {
            color: white;
            transform: scale(1.05);
            box-shadow: 0 6px 12px rgba(0,0,0,0.3);
        }

        .btn-submit:disabled {
            background: var(--border-color);
            animation: none;
            cursor: not-allowed;
            transform: none !important;
            box-shadow: none;
        }

        /* AUDIO BAR */
        #audio-bar {
            position: fixed;
            top: 60px;
            left: 0; width: 100%;
            background-color: rgba(255, 255, 255, 0.9);
            border-bottom: 2px solid var(--border-color);
            padding: 10px;
            display: none;
            justify-content: center;
            z-index: 999;
            transition: top 0.3s ease;
        }

        #audio-bar.distraction-free {
            top: 0;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        audio {
            width: 100%;
            max-width: 600px;
            height: 40px;
        }

        /* MAIN CONTENT */
        main {
            flex-grow: 1;
            padding: 120px 15px 70px 15px;
            max-width: 1200px;
            margin: 0 auto;
            width: 100%;
            transition: padding-top 0.3s ease;
        }

        main.has-audio { padding-top: 160px; }
        main.distraction-free { padding-top: 20px; }
        main.distraction-free.has-audio { padding-top: 70px; }

        .tab-content { display: none; }
        .tab-content.active { display: block; }

        /* QUESTION CARDS */
        .question-card {
            background: linear-gradient(135deg, rgba(255,255,255,1) 0%, rgba(240,249,255,0.5) 100%);
            border: 2px solid var(--border-color);
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .question-card:hover {
            transform: scale(1.01); 
            box-shadow: 0 8px 15px rgba(0,0,0,0.1);
        }

        .question-text {
            font-weight: bold;
            margin-bottom: 15px;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        @media (max-width: 800px) {
            .options-grid { grid-template-columns: 1fr; }
        }

        .option-btn {
            background-color: #f8fafc;
            border: 2px solid var(--border-color);
            padding: 12px 15px;
            text-align: left;
            cursor: pointer;
            font-size: inherit;
            border-radius: 6px;
            transition: all 0.2s ease;
            color: var(--text-color);
            min-height: 60px; 
            display: flex;
            align-items: center;
        }

        .option-btn:hover:not(:disabled) {
            background-color: #e2e8f0;
            border-color: #94a3b8;
            transform: scale(1.02); 
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.8;
        }

        .option-btn.correct {
            background: linear-gradient(45deg, #16a34a, #22c55e);
            color: white !important;
            border-color: var(--correct-color) !important;
        }

        .option-btn.wrong {
            background: linear-gradient(45deg, #dc2626, #ef4444);
            color: white !important;
            border-color: var(--wrong-color) !important;
        }

        /* FEEDBACK MESSAGE */
        .feedback-msg {
            margin-top: 15px;
            padding: 10px;
            border-radius: 6px;
            font-weight: bold;
            display: none;
            animation: fadeIn 0.3s ease;
        }
        .feedback-msg.show { display: block; }
        .feedback-msg.success { background-color: #dcfce7; color: var(--correct-color); border: 1px solid var(--correct-color); }
        .feedback-msg.error { background-color: #fee2e2; color: var(--wrong-color); border: 1px solid var(--wrong-color); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }

        /* TROPHY & EMOJI ANIMATION */
        .emoji-anim {
            display: inline-block;
            font-size: 2.5rem; 
            vertical-align: middle;
            margin-left: 15px;
            animation: popIcon 0.8s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards;
        }

        @keyframes popIcon {
            0% { transform: scale(0) rotate(-30deg); opacity: 0; }
            20% { transform: scale(1.5) rotate(15deg); opacity: 1; }
            40% { transform: scale(1.1) rotate(-10deg); }
            60% { transform: scale(1.3) rotate(5deg); }
            80% { transform: scale(1) rotate(0deg); opacity: 1; }
            100% { transform: scale(1); opacity: 1; } 
        }

        /* STUDENT PROMPT MODAL */
        #student-prompt-modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(15, 23, 42, 0.95);
            display: none; 
            justify-content: center;
            align-items: center;
            z-index: 10000;
        }

        .modal-box {
            background: linear-gradient(135deg, rgba(255,255,255,1) 0%, rgba(240,249,255,1) 100%);
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 500px;
            width: 90%;
            animation: fadeIn 0.3s ease;
        }

        .modal-box input {
            width: 100%;
            padding: 12px;
            font-size: 1.2rem;
            margin: 20px 0;
            border: 2px solid var(--border-color);
            border-radius: 6px;
            text-align: center;
        }

        #student-name-display {
            font-size: 1.8rem; 
            font-weight: bold;
            min-height: 40px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        .btn-submit, .btn-cancel {
            padding: 12px 30px;
            font-size: 1.1rem;
            border-radius: 6px;
            cursor: pointer;
            text-transform: uppercase;
            font-weight: bold;
            transition: all 0.2s ease;
        }

        /* FLOATING BUTTON */
        #distraction-btn {
            position: fixed;
            bottom: 40px; right: 20px;
            width: 50px; height: 50px;
            border-radius: 50%;
            background-color: var(--primary-dark);
            color: white;
            border: none;
            font-size: 24px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            z-index: 9999;
            display: flex; justify-content: center; align-items: center;
            transition: transform 0.2s ease, background-color 0.2s;
        }
        #distraction-btn:hover {
            transform: scale(1.1); 
            background-color: #1e40af;
        }

        /* GENERATE RANDOM BTN */
        .generate-btn {
            padding: 12px 24px;
            font-size: 1.1rem; font-weight: bold; border-radius: 8px;
            cursor: pointer; margin: 0 auto 25px auto; display: block;
            text-transform: uppercase; box-shadow: 0 4px 6px rgba(0,0,0,0.2);
            transition: all 0.2s ease;
        }

        /* ANIMATED FOOTER PROGRESS BAR */
        @keyframes scrollGradient { 0% {background-position: 0% 0;} 100% {background-position: 200% 0;} }
        
        footer {
            background: linear-gradient(90deg, #1e3a8a, #3b82f6, #1e3a8a);
            background-size: 200% 100%;
            animation: scrollGradient 5s linear infinite;
            color: white; text-align: center; padding: 10px;
            position: fixed; bottom: 0; width: 100%;
            font-size: 0.9rem; font-weight: bold; letter-spacing: 1px;
            z-index: 1000; transition: transform 0.3s ease;
        }
        footer.distraction-free { transform: translateY(100%); }

    </style>
</head>

        /** ==========================================
         * STUDENT VERIFICATION LOGIC (MODAL)
         * ========================================== */
        function verifyStudent() {
            const input = document.getElementById('student-id-input').value.trim();
            const display = document.getElementById('student-name-display');
            const btn = document.getElementById('submit-answer-btn');

            if (input.length > 0) {
                if (studentsDB[input]) {
                    display.innerText = studentsDB[input];
                    display.style.color = "var(--correct-color)";
                    btn.disabled = false;

                } else {
                    display.innerText = "⚠️ Student not found in database.";
                    display.style.color = "var(--wrong-color)";

                    currentStudent = { id: null, name: null };
                }
            } else {
                display.innerText = "";
                btn.disabled = true;
                currentStudent = { id: null, name: null };
            }
        }

        function handleEnter(event) {
            if (event.key === 'Enter') {
                event.preventDefault(); 
                const btn = document.getElementById('submit-answer-btn');
                if (!btn.disabled) {
                    confirmAnswer();
                }
            }
        }

        window.onload = () => {
            initUI();
        };

        /** ==========================================
         * CORE UI & GENERATION LOGIC
         * ========================================== */
        function initUI() {
            const tabsContainer = document.getElementById('tabs-container');
            const mainContent = document.getElementById('main-content');
            
            // Build Category Tabs & Containers dynamically
            let first = true;
            for (let category in rawQuizData) {
                const tabId = category.replace(/[^a-z0-9]/gi, '');
                
                // Add Tab Button
                const btn = document.createElement('button');
                btn.className = `tab-btn ${first ? 'active' : ''}`;
                btn.innerText = category;
                btn.onclick = (e) => switchTab(e, tabId, category);
                tabsContainer.appendChild(btn);

                // Add Content Container
                const section = document.createElement('div');
                section.id = tabId;
                section.className = `tab-content ${first ? 'active' : ''}`;
                section.innerHTML = `<h2>${category}</h2><div class="quiz-container"></div>`;
                mainContent.appendChild(section);

                if(first) {
                    renderQuiz(category, section.querySelector('.quiz-container'));
                    first = false;
                }
            }

            // Build "Mixed Practice" Tab
            const mixId = "MixedPractice";
            const mixBtn = document.createElement('button');
            mixBtn.className = "tab-btn";
            mixBtn.innerText = "Mixed Practice";
            mixBtn.onclick = (e) => switchTab(e, mixId, "Mixed Practice");
            tabsContainer.appendChild(mixBtn);

            const mixSection = document.createElement('div');
            mixSection.id = mixId;
            mixSection.className = "tab-content";
            mixSection.innerHTML = `
                <h2>Mixed Practice (Randomized)</h2>
                <button class="generate-btn" onclick="renderMixedPractice()">Generate New Random Set</button>
                <div class="quiz-container"></div>
            `;
            mainContent.appendChild(mixSection);
        }

        function shuffleArray(array) {
            let arr = [...array];
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        function escapeHTML(str) {
            return str.replace(/&/g, '&amp;')
                      .replace(/</g, '&lt;')
                      .replace(/>/g, '&gt;')
                      .replace(/"/g, '&quot;')
                      .replace(/'/g, '&#39;');
        }

        function buildQuestionsHTML(questionsArr, categoryName) {
            let html = '';
            questionsArr.forEach((qObj, index) => {
                let optsMapped = qObj.opts.map(opt => ({ text: opt, isCorrect: opt === qObj.ansText }));
                optsMapped = shuffleArray(optsMapped);

                const safeCorrectText = escapeHTML(qObj.ansText);
                const safeQText = escapeHTML(qObj.q);
                const safeCategory = escapeHTML(categoryName);

                const gridClass = "options-grid grid-2x2"; 

                html += `
                    <div class="question-card">
                        <div class="question-text">${index + 1}. ${escapeHTML(qObj.q)}</div>
                        <div class="${gridClass}">
                            ${optsMapped.map((opt, i) => {
                                const safeOptText = escapeHTML(opt.text);
                                return `<button class="option-btn" 
                                    data-q="${safeQText}"
                                    data-opt="${safeOptText}"
                                    data-correct="${safeCorrectText}"
                                    data-cat="${safeCategory}"
                                    onclick="promptForStudent(this)">
                                    ${String.fromCharCode(65 + i)}) ${safeOptText}
                                </button>`;
                            }).join('')}
                        </div>
                        <div class="feedback-msg"></div>
                    </div>
                `;
            });
            return html;
        }

        function renderQuiz(category, container) {
            if (!container) return;
            const shuffledQs = shuffleArray(rawQuizData[category]);
            container.innerHTML = buildQuestionsHTML(shuffledQs, category);
        }

        function renderMixedPractice() {
            const container = document.querySelector('#MixedPractice .quiz-container');
            let mixedSelection = [];
            const unitKeys = Object.keys(rawQuizData);
            
            // Draw exactly 3 random unique questions from EACH category equally
            for (let category of unitKeys) {
                const shuffled = shuffleArray(rawQuizData[category]);
                mixedSelection = mixedSelection.concat(shuffled.slice(0, 3));
            }
            
            // Final shuffle of the mixed questions
            mixedSelection = shuffleArray(mixedSelection);
            container.innerHTML = buildQuestionsHTML(mixedSelection, "Mixed Practice");
        }

        function switchTab(event, tabId, categoryName) {
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            const activeSection = document.getElementById(tabId);
            activeSection.classList.add('active');
            
            if(categoryName === "Mixed Practice") {
                renderMixedPractice();
            } else {
                renderQuiz(categoryName, activeSection.querySelector('.quiz-container'));
            }
            
            window.scrollTo({top: 0, behavior: 'smooth'});
        }

        /** ==========================================
         * TEST EXECUTION LOGIC & ANSWER CONFIRMATION
         * ========================================== */
        function promptForStudent(btn) {
            const qText = btn.getAttribute('data-q');
            const selectedText = btn.getAttribute('data-opt');
            const correctText = btn.getAttribute('data-correct');
            const category = btn.getAttribute('data-cat');
            
            pendingAnswerContext = { btn, qText, selectedText, correctText, category };
            
            document.getElementById('student-id-input').value = '';
            document.getElementById('student-name-display').innerText = '';
            document.getElementById('submit-answer-btn').disabled = true;
            currentStudent = { id: null, name: null };

            document.getElementById('student-prompt-modal').style.display = 'flex';
            setTimeout(() => document.getElementById('student-id-input').focus(), 50);
        }

        function cancelPrompt() {
            document.getElementById('student-prompt-modal').style.display = 'none';
            pendingAnswerContext = null; 
        }

        function confirmAnswer() {
            if (!pendingAnswerContext) return;
            const { btn, qText, selectedText, correctText, category } = pendingAnswerContext;
            
            const isCorrect = (selectedText === correctText);
            const nameDisplay = document.getElementById('student-name-display');
            const submitBtn = document.getElementById('submit-answer-btn');

            const winEmojis = ['🏆', '🌟', '🎉', '🥇', '⭐', '🔥', '👑', '💯', '🚀'];
            const lossEmojis = ['😥', '😭', '💔', '😞', '😓', '😔', '👎', '🤦', '😩', '🥺'];

            if (isCorrect) {
                const randomWin = winEmojis[Math.floor(Math.random() * winEmojis.length)];
                nameDisplay.innerHTML += ` <span class="emoji-anim">${randomWin}</span>`;
                submitBtn.disabled = true;
                
                setTimeout(() => {
                    document.getElementById('student-prompt-modal').style.display = 'none';
                    processAnswerUI(true, btn, qText, selectedText, correctText, category);
                }, 1000);
            } else {
                const randomLoss1 = lossEmojis[Math.floor(Math.random() * lossEmojis.length)];
                let randomLoss2 = lossEmojis[Math.floor(Math.random() * lossEmojis.length)];
                while(randomLoss1 === randomLoss2) randomLoss2 = lossEmojis[Math.floor(Math.random() * lossEmojis.length)];

                nameDisplay.innerHTML += ` <span id="sad-emoji" class="emoji-anim">${randomLoss1}</span>`;
                submitBtn.disabled = true;

                setTimeout(() => {
                    const sadEmoji = document.getElementById('sad-emoji');
                    if(sadEmoji) sadEmoji.innerText = randomLoss2;
                }, 500);

                setTimeout(() => {
                    document.getElementById('student-prompt-modal').style.display = 'none';
                    processAnswerUI(false, btn, qText, selectedText, correctText, category);
                }, 1000);
            }
        }

        function processAnswerUI(isCorrect, btn, qText, selectedText, correctText, category) {
            const grid = btn.parentElement;
            const card = grid.parentElement;
            const buttons = grid.querySelectorAll('.option-btn');
            const feedback = card.querySelector('.feedback-msg');
            
            buttons.forEach(b => b.disabled = true);

            if (isCorrect) {
                btn.classList.add('correct');
                feedback.innerText = "✔ Correct!";
                feedback.className = "feedback-msg show success";
                saveRecord(category, qText, selectedText, correctText, "Correct");
            } else {
                btn.classList.add('wrong');
                feedback.innerHTML = `✘ Incorrect. <br><span style="color:#000; font-weight:normal;">The correct answer is:</span> ${escapeHTML(correctText)}`;
                feedback.className = "feedback-msg show error";
                
                buttons.forEach(b => {
                    if(b.getAttribute('data-opt') === correctText) b.classList.add('correct');
                });
            }

            pendingAnswerContext = null;
        }

        /** ==========================================
         * DATA EXPORT & AUTO-SAVE
         * ========================================== */
        function escapeCSV(str) {
            return `"${String(str).replace(/"/g, '""')}"`;
        }

        function generateCSVRow(category, question, selected, correct, status) {
            const d = new Date().toLocaleString();
            return [
                escapeCSV(d),
                escapeCSV(currentStudent.id),
                escapeCSV(currentStudent.name),
                escapeCSV(category),
                escapeCSV(question),
                escapeCSV(selected),
                escapeCSV(correct),
                escapeCSV(status)
            ].join(',') + '\n';
        }

        async function saveRecord(category, question, selected, correct, status) {
            if (!currentStudent.id) return; 
            
            const csvRow = generateCSVRow(category, question, selected, correct, status);
            testRecords.push(csvRow);

            if (autoSaveEnabled && fileHandle) {
                try {
                    const writable = await fileHandle.createWritable({ keepExistingData: true });
                    const file = await fileHandle.getFile();
                    await writable.write({ type: 'write', position: file.size, data: csvRow });
                    await writable.close();
                } catch (err) {
                    console.error("Auto-Save failed:", err);
                    alert("Auto-save failed. Permission might be revoked or file locked.");
                    disableAutoSaveUI();
                }
            }
        }

        function exportCSV() {
            if (testRecords.length === 0) {
                alert("No correct records to export yet.");
                return;
            }
            const headers = "Date,Student Number,Student Name,Category,Question,Selected Answer,Correct Answer,Status\n";
            const BOM = "\uFEFF"; 
            const csvContent = BOM + headers + testRecords.join('');
            
            const blob = new Blob([csvContent], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `Results_Batch_${new Date().getTime()}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        async function toggleAutoSave() {
            const btn = document.getElementById('auto-save-btn');
            
            if (autoSaveEnabled) {
                disableAutoSaveUI();
                return;
            }

            if (!window.showSaveFilePicker) {
                alert("Your browser does not support the File System Access API. Auto-save is unavailable. Please use the 'Export CSV' button instead.");
                return;
            }

            try {
                fileHandle = await window.showSaveFilePicker({
                    suggestedName: `LiveResults_Batch.csv`,
                    types: [{
                        description: 'CSV Files',
                        accept: { 'text/csv': ['.csv'] },
                    }],
                });
                
                const file = await fileHandle.getFile();
                if (file.size === 0) {
                    const writable = await fileHandle.createWritable();
                    const BOM = "\uFEFF";
                    const headers = "Date,Student Number,Student Name,Category,Question,Selected Answer,Correct Answer,Status\n";
                    await writable.write(BOM + headers);
                    await writable.close();
                }

                autoSaveEnabled = true;
                btn.innerText = "Auto-Save: ON";
                btn.classList.add('active');
            } catch (err) {
                console.warn("User cancelled or API failed.", err);
            }
        }

        function disableAutoSaveUI() {
            autoSaveEnabled = false;
            fileHandle = null;
            const btn = document.getElementById('auto-save-btn');
            btn.innerText = "Auto-Save: OFF";
            btn.classList.remove('active');
        }

        /** ==========================================
         * UX CONTROLS (Zoom & Distraction Free)
         * ========================================== */
        function adjustZoom(amount) {
            currentZoom += amount;
            if (currentZoom < 16) currentZoom = 16;
            if (currentZoom > 30) currentZoom = 30;
            document.body.style.fontSize = currentZoom + 'px';
        }

        function toggleDistractionFree() {
            distractionFree = !distractionFree;
            const topBar = document.getElementById('top-bar');
            const footer = document.getElementById('footer');
            const main = document.getElementById('main-content');
            const audioBar = document.getElementById('audio-bar');

            if (distractionFree) {
                topBar.classList.add('distraction-free');
                footer.classList.add('distraction-free');
                main.classList.add('distraction-free');
                audioBar.classList.add('distraction-free');
            } else {
                topBar.classList.remove('distraction-free');
                footer.classList.remove('distraction-free');
                main.classList.remove('distraction-free');
                audioBar.classList.remove('distraction-free');
            }
        }

        function loadListeningTrack(src) {
            const aBar = document.getElementById('audio-bar');
            const aSrc = document.getElementById('audio-source');
            const audioObj = document.getElementById('global-audio');
            
            if(src) {
                aSrc.src = src;
                audioObj.load();
                aBar.style.display = 'flex';
                document.getElementById('main-content').classList.add('has-audio');
            } else {
                aBar.style.display = 'none';
                document.getElementById('main-content').classList.remove('has-audio');
            }
        }

    </script>
</body>
</html>
